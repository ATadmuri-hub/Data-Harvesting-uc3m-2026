# Research Question &amp; Hypotheses

.pull-left[

&gt; **Does the frequency of official government immigration statements correlate with shifts in PSOE electoral support over the 2023–2026 governing period, and can historical data produce a credible 2027 electoral forecast?**

&lt;br&gt;

| Hypothesis | Direction | Result |
|:-----------|:---------:|:------:|
| H1: Gov. statements → PSOE | Positive | **Not supported** (r = 0.074) |
| H2: Media salience → PSOE | Negative | **Supported** (r = −0.699) |
| H3: Time trend → PSOE | Negative | **Supported** (β = −0.142) |

]

.pull-right[

&lt;br&gt;&lt;br&gt;

&lt;div class="box blue" style="margin-bottom:0.6em;"&gt;
&lt;strong&gt;H1 (Framing):&lt;/strong&gt; Government press releases on immigration reassure centrist voters → PSOE improves
&lt;/div&gt;

&lt;div class="box red" style="margin-bottom:0.6em;"&gt;
&lt;strong&gt;H2 (Issue ownership):&lt;/strong&gt; Higher media salience benefits right-leaning parties via Petrocik (1996) issue ownership mechanism → PSOE falls
&lt;/div&gt;

&lt;div class="box orange"&gt;
&lt;strong&gt;H3 (Attrition):&lt;/strong&gt; Mid-term governmental fatigue is a robust democratic regularity → PSOE falls monotonically
&lt;/div&gt;

# Source 1: La Moncloa — CDX API + HTML Scraping

.pull-left[

**The problem:** La Moncloa's index page uses JavaScript-rendered filtering — URL parameters are ignored by the server, returning today's content regardless.

**The solution:** Wayback Machine CDX API to discover historical press release URLs, then live scraping to extract body text.

**Two-stage architecture:**
1. CDX API discovers all archived URLs matching immigration slug keywords from three ministries
2. Live scraping of confirmed URLs extracts title, body text, word count, and date
3. Body text matched against 25 immigration keywords to confirm relevance

**Output:** 64 confirmed immigration press releases over 28 months (mean: 2.3/month, max: 8 in a single month)

.muted[robots.txt checked via `robotstxt` package; polite 2–4 s delays applied]

]

.pull-right[

```r
# Stage 1 — CDX API URL discovery
CDX_BASE &lt;- "https://web.archive.org/cdx/search/cdx"

cdx_url &lt;- paste0(
  CDX_BASE,
  "?url=www.lamoncloa.gob.es/ministerios/",
  ministry, "/*",
  "&amp;output=json",
  "&amp;limit=5000",
  "&amp;from=", START_DATE,   # "20231101"
  "&amp;to=",   END_DATE,     # "20260301"
  "&amp;filter=statuscode:200"
)

cdx_resp &lt;- request(cdx_url) |&gt;
  req_headers(`User-Agent` = USER_AGENT) |&gt;
  req_retry(max_tries = 3, backoff = ~ 8) |&gt;
  req_perform()

urls &lt;- resp_body_json(cdx_resp) |&gt;
  map_chr(~ .x[[3]])  # column 3 = original URL

# Stage 2 — Live HTML scraping (XPath)
page &lt;- read_html(url)

# XPath: find &lt;h1&gt; anywhere in the DOM tree
title &lt;- page |&gt;
  xml_find_first("//h1") |&gt;
  xml_text(trim = TRUE)

# XPath union: try multiple body containers
body_nodes &lt;- page |&gt;
  xml_find_all(paste(
    "//div[contains(@class,'noticia-texto')]//p",
    "//div[contains(@class,'cuerpo-noticia')]//p",
    "//article//p",
    sep = " | "))
body &lt;- xml_text(body_nodes) |&gt;
  paste(collapse = " ")

# Regex: extract date from URL slug
date &lt;- str_extract(slug, "^\\d{6,8}")
```

]

# Source 2: Wikipedia Opinion Polls

.pull-left[

**Target:** Wikipedia article *"Opinion polling for the next Spanish general election"*

**Page structure:** 5 wikitables (one per year + historical CIS series), sorted newest-first, with polling firm, dates, sample size, and vote shares per party

**Challenges:**
- Header rows use image `alt` attributes, not plain text → extracted via `html_attr("alt")`
- Percentage columns contain ranges (e.g., `"28.1–29.3%"`) → midpoint extraction via regex
- Fieldwork dates span two rows → cleaned with `lubridate::dmy()`
- 47+ polling firms with inconsistent name formatting → standardised

**Output:** 429 polls → aggregated to 28 monthly averages

]

.pull-right[

```r
WIKI_URL &lt;- paste0(
  "https://en.wikipedia.org/wiki/",
  "Opinion_polling_for_the_next_",
  "Spanish_general_election"
)

page &lt;- read_html(
  request(WIKI_URL) |&gt;
    req_headers(`User-Agent` = UA) |&gt;
    req_retry(max_tries = 3,
              backoff = ~ 5) |&gt;
    req_perform() |&gt;
    resp_body_string()
)

# Extract all wikitables
tables &lt;- page |&gt;
  html_elements("table.wikitable")

# XPath: party names hidden in &lt;img alt&gt;
header_ths &lt;- tables[[1]] |&gt;
  xml_find_all(".//tr[1]/th")
col_names &lt;- map_chr(header_ths, \(th) {
  txt &lt;- xml_text(th, trim = TRUE)
  if (nchar(txt) &gt; 0) return(txt)
  # Fallback: image alt attribute
  th |&gt; xml_find_first(".//img") |&gt;
    xml_attr("alt") %|% "unknown"
})

# Regex: extract % from range strings
pct &lt;- str_extract(raw_polls$PSOE,
  "\\d+\\.?\\d*") |&gt; as.numeric()
```

]

# Source 3: INE Demographics API

.pull-left[

**The INE (Instituto Nacional de Estadística)** provides a REST/JSON API with no authentication required.

**Two series collected:**

**1. Unemployment by province** — EPA Table 65349 (Operation 293), quarterly, 477 series covering all 47 Spanish provinces by sex. Used to construct provincial unemployment context for the reaction map.

**2. Foreign population trend** — Table 9683, filtered to total non-Spanish population at national level (sex: ambos sexos). Provides the structural demographic backdrop to the immigration debate.

**Rate limiting:** INE API is tolerant; `req_retry(max_tries = 3, backoff = ~ 10)` used as a precaution. No `robots.txt` restrictions.

.muted[Documented at: ine.es/dyngs/DAB — publicly available open data]

]

.pull-right[

```r
INE_BASE &lt;- "https://servicios.ine.es/wstempus/js/ES"

# Helper: fetch any INE table as JSON
fetch_ine &lt;- function(endpoint, params = "") {
  url &lt;- paste0(INE_BASE, "/", endpoint,
    if (nchar(params) &gt; 0)
      paste0("?", params) else "")

  resp &lt;- request(url) |&gt;
    req_headers(`User-Agent` = UA) |&gt;
    req_retry(max_tries = 3,
              backoff = ~ 10) |&gt;
    req_timeout(30) |&gt;
    req_perform()

  resp |&gt; resp_body_json()
}

# Foreign population — Table 9683
# tv=70032:16420  → total nationality
# tv=70013:451    → ambos sexos (both)
pop_data &lt;- fetch_ine(
  "DATOS_TABLA/9683",
  "tv=70032:16420,tv=70013:451"
)

# Unemployment — EPA Table 65349
unemp &lt;- fetch_ine("DATOS_TABLA/65349")
```

]

# Source 4: El País Media Salience

.pull-left[

**Target:** El País immigration section — paginated topic pages covering all tagged immigration articles

**Approach:** Paginated scraping of `elpais.com/tag/inmigracion/` with polite delays; headlines and dates extracted from article cards

**Salience construction:**
1. Raw monthly article count (mean: 128 articles/month, range: 51–208)
2. Keyword filter: 27 immigration-related terms applied to headline text
3. Normalised 0–100 index: `n_immigration / max(n_immigration) × 100`

**Result:** Salience index captures media agenda intensity, not just volume — months with 208 articles score 100; months with 51 score 24.5

.muted[El País blocks headless browsers; standard `httr2` GET with browser User-Agent works within robots.txt rules]

]

# Finding 1: PSOE Support in Persistent Decline

&lt;img src="presentation_files/figure-html/timeline-1.png" width="100%" style="display: block; margin: auto;" /&gt;

.pull-left[
&lt;div class="box red" style="font-size:0.85em; margin-top:0.4em;"&gt;
&lt;strong&gt;PSOE trend:&lt;/strong&gt; −0.142 pp/month (OLS, p &amp;lt; 0.001) · Cumulative observed fall: &lt;strong&gt;≈ 3.3 pp&lt;/strong&gt; over 28 months
&lt;/div&gt;
]

.pull-right[
&lt;div class="box blue" style="font-size:0.85em; margin-top:0.4em;"&gt;
&lt;strong&gt;PP lead:&lt;/strong&gt; PP averaged 30.3% vs PSOE 27.2% · PP-PSOE gap widened from ~5 pp to ~8 pp by end of period
&lt;/div&gt;
]

# Finding 2: Media Salience Suppresses PSOE Support

.pull-left[

&lt;img src="presentation_files/figure-html/scatter-1.png" width="100%" style="display: block; margin: auto;" /&gt;

]

.pull-right[

&lt;div class="box red" style="margin-bottom:0.6em; margin-top:0.3em;"&gt;
&lt;strong&gt;Pearson r = −0.699&lt;/strong&gt; (p &amp;lt; 0.001)&lt;br&gt;
Months with highest immigration media coverage consistently coincide with lowest PSOE polling.
&lt;/div&gt;

&lt;div class="box orange" style="margin-bottom:0.7em;"&gt;
&lt;strong&gt;OLS coefficient:&lt;/strong&gt; β = −0.014 (NW-robust p ≈ 0.10) — marginal significance after controlling for time trend. Effect is real but partially mediated by the secular decline.
&lt;/div&gt;

&lt;div class="box blue"&gt;
&lt;strong&gt;Mechanism (Petrocik 1996):&lt;/strong&gt; Issue ownership theory — when immigration becomes more salient, voters increasingly associate the issue with right-leaning parties (PP, Vox), not the governing left.
&lt;/div&gt;

]

---

# Finding 2b: The Correlation Is Structural, Not Episodic

.pull-left[

&lt;img src="presentation_files/figure-html/rolling-corr-1.png" width="100%" style="display: block; margin: auto;" /&gt;

]

.pull-right[

&lt;br&gt;

&lt;div class="box red" style="margin-bottom:0.7em;"&gt;
&lt;strong&gt; Highly unstable.&lt;/strong&gt; The rolling correlation is initially  positive, however it  reverses sharply negative by Autumn 2024, recovers again to +0.75 in early 2025, before declining into persistent negative territory from mid-2025 onward.
&lt;/div&gt;

&lt;div class="box orange" style="margin-bottom:0.7em;"&gt;
&lt;strong&gt;Deepening trend:&lt;/strong&gt; The correlation is negative toward Nov 2025, and stabilizes from Nov 2025&amp;ndash;Feb 2026 (regularisation debate), suggesting the relationship strengthens as the issue intensifies.
&lt;/div&gt;

&lt;div class="box blue"&gt;
&lt;strong&gt;Implication:&lt;/strong&gt; The observation window is relatively short, which limits our ability to distinguish structural long-term effects from common temporal trends. As a result, the observed association may reflect a persistent relationship, but it could also be driven by broader time dynamics that affect both variables during the study period
&lt;/div&gt;

]

# Finding 3: La Moncloa Cannot Lead the Narrative

.pull-left[

**Granger causality tests** (order = 2, Newey-West robust) test whether past values of X help predict future PSOE support beyond what PSOE's own history predicts.

| Predictor | F-stat | p-value | Verdict |
|:----------|:------:|:-------:|:-------:|
| Gov. statements | 0.138 | 0.872 | **No predictive power** |
| Media salience | 0.342 | 0.714 | **No predictive power** |

&lt;br&gt;

**Cross-correlation peak:** No lag exceeds the significance threshold (±0.377). The largest CCF value is at lag 3 (r = −0.297), still well below the bound. Bivariate Pearson r between statements and PSOE levels = 0.074 (near-zero).

&lt;div class="box" style="margin-top:0.7em; font-size:0.88em;"&gt;
&lt;strong&gt;Implication:&lt;/strong&gt; La Moncloa's communication strategy is &lt;em&gt;reactive&lt;/em&gt;, not strategic — press release volume responds to media salience, not the reverse.
&lt;/div&gt;

]

.pull-right[

&lt;br&gt;

&lt;div class="box red" style="margin-bottom:0.8em;"&gt;
&lt;strong&gt;Correlation: r = 0.074&lt;/strong&gt;&lt;br&gt;
Government immigration statements are essentially uncorrelated with PSOE voting intention. The framing hypothesis (H1) is comprehensively rejected.
&lt;/div&gt;

&lt;div class="box orange" style="margin-bottom:0.8em;"&gt;
&lt;strong&gt;Reactive vs strategic:&lt;/strong&gt; Press release count shows weak positive correlation with media salience (r = 0.101) — ministries may respond to the news cycle, but the association is negligible.
&lt;/div&gt;

&lt;div class="box blue"&gt;
&lt;strong&gt;Policy implication:&lt;/strong&gt; Increasing the frequency of immigration press releases is unlikely to arrest the polling decline. The dominant predictor is time — not communication.
&lt;/div&gt;

]

# The January 2026 Regularisation: A Non-Voter Event

.pull-left[

**The regularisation decree** grants legal status to ~500,000 undocumented migrants who meet residency criteria. Media framing portrays this as electorally significant.

**The data says otherwise:**

| Pathway | Adds voters? | Why? |
|:--------|:------------:|:----:|
| Legal residency only | ❌ | Residency ≠ citizenship |
| Citizenship via naturalization | ❌ | Requires 10 yrs (general) / 2 yrs (Ibero-American) |
| 2027 General Election suffrage | ❌ | Only Spanish nationals may vote |
| Referendum / EU Parliament | ❌ | EU residence rights require citizenship |

&lt;div class="box red" style="font-size:0.88em; margin-top:0.7em;"&gt;
&lt;strong&gt;Zero direct electoral impact.&lt;/strong&gt; No regularised migrant will gain Spanish suffrage by the June 2027 General Election under any realistic timeline.
&lt;/div&gt;

]

.pull-right[

&lt;br&gt;

&lt;div class="box orange" style="margin-bottom:0.7em;"&gt;
&lt;strong&gt;Where the effect IS:&lt;/strong&gt; Issue salience. The regularisation debate sustained high El País immigration coverage through Jan–Feb 2026 — the highest salience months in the study window.
&lt;/div&gt;

&lt;div class="box blue" style="margin-bottom:0.7em;"&gt;
&lt;strong&gt;Indirect electoral pathways:&lt;/strong&gt;&lt;br&gt;
• Mobilises existing left-wing voters who support the measure&lt;br&gt;
• Triggers right-wing counter-mobilisation (PP + Vox)&lt;br&gt;
• Keeps immigration high on the agenda → favours issue-ownership holders (PP/Vox per H2)
&lt;/div&gt;

&lt;div class="box" style="font-size:0.85em;"&gt;
&lt;strong&gt;Historical parallel (2005):&lt;/strong&gt; Zapatero's regularisation (~700,000 applications) coincided with a sustained PSOE recovery — but that recovery was driven by macro-economic conditions, not the regularisation per se.
&lt;/div&gt;

]

# Five Key Conclusions

&lt;div class="finding"&gt;&lt;div class="finding-num"&gt;1&lt;/div&gt;&lt;div&gt;&lt;strong&gt;PSOE support fell −0.142 pp/month throughout the Sánchez term&lt;/strong&gt; — a cumulative observed decline of ~3.3 pp from 29.1% (Nov 2023) to ~25.8% (Feb 2026). The trend is robust across all model specifications (adj. R² = 0.695–0.705).&lt;/div&gt;&lt;/div&gt;

&lt;div class="finding"&gt;&lt;div class="finding-num"&gt;2&lt;/div&gt;&lt;div&gt;&lt;strong&gt; Higher media attention to immigration is associated with lower support for the Spanish Socialist Workers' Party (r = −0.699, p &lt; 0.001). Consistent with the issue-ownership theory of John R. Petrocik, greater salience may shift the debate toward an issue where parties like the People's Party and Vox are seen as stronger.
However, this pattern may partly reflect a shared time trend. After removing the trend, the effect becomes weaker and only marginally significant (p ≈ 0.10).&lt;/div&gt;&lt;/div&gt;

&lt;div class="finding"&gt;&lt;div class="finding-num"&gt;3&lt;/div&gt;&lt;div&gt;&lt;strong&gt;La Moncloa's immigration communication has zero predictive power&lt;/strong&gt;. Granger tests (F = 0.138, p = 0.872 for statements; F = 0.342, p = 0.714 for salience) confirm no lead-lag effect. The government reacts to the news cycle; it does not shape it.&lt;/div&gt;&lt;/div&gt;

&lt;div class="finding"&gt;&lt;div class="finding-num"&gt;4&lt;/div&gt;&lt;div&gt;&lt;strong&gt;The January 2026 regularisation adds zero direct voters&lt;/strong&gt;. All ~500,000 beneficiaries remain ineligible for national suffrage through 2027. Electoral consequences are entirely mediated via issue salience — which our model shows hurts PSOE.&lt;/div&gt;&lt;/div&gt;

&lt;div class="finding"&gt;&lt;div class="finding-num"&gt;5&lt;/div&gt;&lt;div&gt;&lt;strong&gt;2027 projections place PP around 136–137 seats and PSOE around 120 seats. Immigration salience shifts the margin slightly (≈3 seats) but does not materially change coalition outcomes.&lt;/div&gt;&lt;/div&gt;


---

# Limitations &amp; Reproducibility

.pull-left[

**Technical limitations**

- La Moncloa CDX coverage: Wayback Machine indexes ~85–90% of pages; some press releases may be missing
- Wikipedia polls: CIS polling methodology changed in 2024 — pre/post comparison requires caution
- El País paywall: only headlines and metadata accessible without subscription — article body sentiment not captured
- INE provincial unemployment: quarterly frequency → interpolated to monthly (linear)

**Modelling limitations**

- n = 28 monthly observations — low statistical power for multi-predictor OLS
- ARIMA(0,1,0) assumes a random walk; model selection via AIC/BIC on short series is inherently uncertain
- Omitted variables: unemployment shocks, coalition crises, EU elections not modelled

]

.pull-right[

**Reproducibility**

All data collection and analysis is fully reproducible:

```r
# Full pipeline: ~10–20 minutes
Rscript main.R

# Render report
Rscript -e "rmarkdown::render('report.Rmd')"
```

Outputs:
- `data/raw/` — all scraped raw files
- `data/processed/` — cleaned panel + model results
- `output/plots/` — all figures
- `report.html` — full self-contained report

&lt;div class="box green" style="margin-top:0.8em; font-size:0.86em;"&gt;
&lt;strong&gt;Pipeline verified:&lt;/strong&gt; All 8 scripts run end-to-end with no manual steps. Data refresh requires only re-running &lt;code&gt;main.R&lt;/code&gt;.
&lt;/div&gt;

]
